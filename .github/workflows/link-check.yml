name: Check download links

on:
  # Weekly, shortly after the daily NuGet update has had a chance to run.
  schedule:
    - cron: "30 9 * * 1"
  # On any change to the data or the checker itself.
  push:
    paths:
      - "data/**"
      - "scripts/check_links.py"
      - ".github/workflows/link-check.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: link-check
  cancel-in-progress: true

jobs:
  link-check:
    runs-on: ubuntu-latest
    env:
      PUSH_TOKEN: ${{ secrets.WEBSITE_TOKEN || secrets.GITHUB_TOKEN || secrets.DEPLOY }}
    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      # Writes link-status.json (online/total/checked_at) even when links are
      # broken, then exits non-zero if any are broken so the run is flagged.
      - name: Check all download links
        id: check
        run: python scripts/check_links.py --status-file link-status.json data/rhino-versions.md data/rhino-versions-all.md

      # Always publish the latest status badge data, pass or fail.
      - name: Commit link-status.json if changed
        if: always()
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${PUSH_TOKEN}@github.com/${{ github.repository }}.git
          git add link-status.json
          if git diff --cached --quiet -- link-status.json; then
            echo "link-status.json unchanged."
          else
            git commit -m "chore: update link-status.json (auto)"
            git pull --rebase origin main || true
            git push origin HEAD:main
          fi
